name: Build Typst Resume

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Build PDF
        run: typst compile doc/main.typ doc/resume_jael_IT.pdf

      - name: Commit PDF back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build resume PDF"
          file_pattern: doc/resume_jael_IT.pdf
